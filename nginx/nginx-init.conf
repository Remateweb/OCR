# Nginx temporário para gerar o certificado SSL pela primeira vez
# Depois que o SSL for gerado, o docker-compose.yml principal assume

server {
    listen 80;
    server_name SEU_DOMINIO.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://ocr-app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
